.navbar-content {

.logo-circle {

.logo-circle img {

}

.logo-text {
    display: flex;

}

.logo-text .brand-name {
    font-family: 'Playfair Display', serif;

.logo-text .brand-tagline {

.navbar-menu {

.navbar-menu a {

    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    position: relative;
    transition: color 0.3s ease;
}

.navbar-menu a::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 0;
    width: 0;
    height: 1px;
    background: #C9A86A;
    transition: width 0.3s ease;
}

.navbar-menu a:hover {
    color: #6E4496;
}

.navbar-menu a:hover::after {
    width: 100%;
}

.navbar-cta {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.navbar-phone {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1.3rem;
    background: transparent;
    border: 1px solid rgba(22, 18, 28, 0.14);
    border-radius: 999px;
    color: #2B2433;
    font-weight: 500;
    font-size: 0.86rem;
    transition: all 0.3s ease;
    line-height: 1;
}

.navbar-phone:hover {
    border-color: #6E4496;
    color: #6E4496;
    background: #F5F1FA;
    transform: translateY(-1px);
}

.navbar-whatsapp {
    padding: 0.7rem 1.4rem;
    background: #1EBE5D;
    color: white;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: all 0.3s ease;
    box-shadow: 0 8px 22px rgba(30, 190, 93, 0.26);
    line-height: 1;
}

.navbar-whatsapp:hover {
    background: #169549;
    transform: translateY(-1px);
    box-shadow: 0 12px 28px rgba(30, 190, 93, 0.36);
}

.hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
}

.hamburger span {
    width: 25px;
    height: 2px;
    background: #16121C;
    border-radius: 3px;
    transition: all 0.3s ease;
}

.hamburger.active span:nth-child(1) {
    transform: rotate(45deg) translate(8px, 8px);
}

.hamburger.active span:nth-child(2) {
    opacity: 0;
}

.hamburger.active span:nth-child(3) {
    transform: rotate(-45deg) translate(7px, -7px);
}

@media (max-width: 1024px) {
    .navbar-menu {
        gap: 1.5rem;
    }
    
    .navbar-cta {
        gap: 0.75rem;
    }
    
    .navbar-phone,
    .navbar-whatsapp {
        padding: 0.65rem 1.25rem;
        font-size: 0.9rem;
    }
}

@media (max-width: 768px) {
    .navbar-menu {
        position: fixed;
        top: 80px;
        left: 0;
        right: 0;
        background: white;
        flex-direction: column;
        padding: 2rem;
        gap: 1.5rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        transform: translateY(-100%);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
    }
    
    .navbar-menu.active {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
    }
    
    /* Ocultar los botones CTA en móvil */
    .navbar-cta {
        display: none !important;
    }
    
    .hamburger {
        display: flex;
    }
    
    .logo-text .brand-name {
        font-size: 1.25rem;
    }
    
    .logo-circle {
        width: 50px;
        height: 50px;
    }
    
    .logo-circle img {
        width: 44px;
        height: 44px;
    }
}
